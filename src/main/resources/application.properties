spring.application.name=cache-demo
app.instance-id=${APP_INSTANCE_ID:local}
app.cache.fail-open=${APP_CACHE_FAIL_OPEN:true}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cachedemo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=1s
spring.data.redis.connect-timeout=1s
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics,caches
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=DEBUG
